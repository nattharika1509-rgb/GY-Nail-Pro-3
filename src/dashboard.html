<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEW BARBER - Dashboard Summary</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #0f172a; color: #e2e8f0; }
        .animate-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyKQ3fvkHgvl_haWoDMXyygoAbyT9PITTMuuB7ul5P98k0OjAVrWYojciw4Wcou8OE5/exec";

        // --- Icons ---
        const IconBase = ({ children, ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>{children}</svg>
        );
        const Icons = {
            BarChart: (p) => <IconBase {...p}><line x1="12" x2="12" y1="20" y2="10"/><line x1="18" x2="18" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="16"/></IconBase>,
            User: (p) => <IconBase {...p}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></IconBase>,
            Scissors: (p) => <IconBase {...p}><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" x2="8.12" y1="4" y2="15.88"/><line x1="14.47" x2="20" y1="14.48" y2="20"/><line x1="8.12" x2="12" y1="8.12" y2="12"/></IconBase>,
            Refresh: (p) => <IconBase {...p}><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></IconBase>,
            TrendingUp: (p) => <IconBase {...p}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></IconBase>
        };

        const DashboardApp = () => {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);

            const fetchData = async () => {
                setLoading(true);
                try {
                    const res = await fetch(`${SCRIPT_URL}?action=getData`);
                    const json = await res.json();
                    setData(json);
                } catch (e) { console.error(e); }
                finally { setLoading(false); }
            };

            useEffect(() => { fetchData(); }, []);

            const stats = useMemo(() => {
                if (!data || !data.allBookings) return null;
                const bookings = data.allBookings;
                const barbers = data.barbers || [];
                
                const valid = bookings.filter(b => b.status === 'Completed' || b.status === 'Approved');
                const income = valid.reduce((sum, b) => sum + (parseInt(b.price) || 0), 0);
                
                // Today/Month
                const today = new Date().toISOString().split('T')[0];
                const thisMonth = new Date().toISOString().substring(0, 7);
                const todayBookings = valid.filter(b => b.date === today);
                const monthBookings = valid.filter(b => b.date && b.date.startsWith(thisMonth));
                
                // By Barber
                const byBarber = {};
                barbers.forEach(b => { if(b.active) byBarber[b.name] = { count: 0, income: 0 }; });
                valid.forEach(b => { 
                    if(byBarber[b.barber] !== undefined) { 
                        byBarber[b.barber].count++; 
                        byBarber[b.barber].income += parseInt(b.price) || 0; 
                    } 
                });

                // By Service
                const byService = {};
                valid.forEach(b => {
                    const svc = b.service || 'Unknown';
                    if(!byService[svc]) byService[svc] = { count: 0, income: 0 };
                    byService[svc].count++;
                    byService[svc].income += parseInt(b.price) || 0;
                });

                // 7 Days Chart
                const dailyStats = [];
                for(let i = 6; i >= 0; i--) {
                    const d = new Date(); d.setDate(d.getDate() - i);
                    const ds = d.toISOString().split('T')[0];
                    const dayB = valid.filter(b => b.date === ds);
                    dailyStats.push({
                        label: d.toLocaleDateString('th-TH', { weekday: 'short' }),
                        income: dayB.reduce((sum, b) => sum + (parseInt(b.price) || 0), 0)
                    });
                }

                return {
                    totalIncome: income,
                    todayIncome: todayBookings.reduce((sum, b) => sum + (parseInt(b.price) || 0), 0),
                    todayCount: todayBookings.length,
                    monthIncome: monthBookings.reduce((sum, b) => sum + (parseInt(b.price) || 0), 0),
                    pendingCount: bookings.filter(b => b.status === 'Pending').length,
                    byBarber,
                    byService: Object.entries(byService).sort((a,b) => b[1].count - a[1].count).slice(0, 5),
                    dailyStats
                };
            }, [data]);

            if (loading) return <div className="flex h-screen items-center justify-center"><div className="animate-spin rounded-full h-12 w-12 border-t-2 border-yellow-500"></div></div>;
            if (!stats) return <div className="p-8 text-center text-red-400">เกิดข้อผิดพลาดในการโหลดข้อมูล</div>;

            return (
                <div className="max-w-4xl mx-auto p-6 animate-in">
                    <div className="flex justify-between items-center mb-8">
                        <h1 className="text-3xl font-bold text-yellow-500 flex items-center gap-3">
                            <Icons.TrendingUp className="w-8 h-8"/> BEW BARBER SUMMARY
                        </h1>
                        <button onClick={fetchData} className="bg-slate-800 p-2 rounded-full hover:bg-slate-700 transition-colors">
                            <Icons.Refresh />
                        </button>
                    </div>

                    {/* สรุปรายได้ */}
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                        {[
                            { label: 'วันนี้', val: stats.todayIncome, sub: stats.todayCount + ' คิว', color: 'from-green-600/20' },
                            { label: 'เดือนนี้', val: stats.monthIncome, sub: 'ยอดรวมสะสม', color: 'from-blue-600/20' },
                            { label: 'รายได้รวม', val: stats.totalIncome, sub: 'ทุกยอดที่ยืนยัน', color: 'from-yellow-600/20' },
                            { label: 'รออนุมัติ', val: stats.pendingCount, sub: 'รายการที่ยังไม่กดรับ', color: 'from-purple-600/20', isMoney: false }
                        ].map((card, i) => (
                            <div key={i} className={`bg-gradient-to-br ${card.color} to-slate-800 p-5 rounded-2xl border border-slate-700 shadow-xl`}>
                                <div className="text-slate-400 text-xs mb-1 font-semibold uppercase tracking-wider">{card.label}</div>
                                <div className="text-2xl font-bold text-white">
                                    {card.isMoney === false ? card.val : '฿' + card.val.toLocaleString()}
                                </div>
                                <div className="text-xs text-slate-500 mt-1">{card.sub}</div>
                            </div>
                        ))}
                    </div>

                    {/* กราฟ 7 วัน */}
                    <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 mb-8 shadow-xl">
                        <h2 className="text-white font-bold mb-6 flex items-center gap-2"><Icons.BarChart /> รายได้ 7 วันล่าสุด</h2>
                        <div className="flex items-end justify-between h-40 gap-3">
                            {stats.dailyStats.map((day, idx) => {
                                const maxIncome = Math.max(...stats.dailyStats.map(d => d.income), 1);
                                const height = (day.income / maxIncome) * 100;
                                return (
                                    <div key={idx} className="flex-1 flex flex-col items-center">
                                        <div className="text-[10px] text-green-400 font-bold mb-1">฿{day.income}</div>
                                        <div className="w-full bg-slate-700/50 rounded-t-lg relative flex-1 min-h-[10px]">
                                            <div 
                                                className="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-yellow-600 to-yellow-400 rounded-t-lg transition-all duration-700 ease-out" 
                                                style={{ height: `${height}%` }}
                                            ></div>
                                        </div>
                                        <div className="text-xs text-slate-500 mt-2 font-medium">{day.label}</div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {/* ตามช่าง */}
                        <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
                            <h2 className="text-white font-bold mb-5 flex items-center gap-2"><Icons.User /> สถิติตามช่าง</h2>
                            <div className="space-y-5">
                                {Object.entries(stats.byBarber).map(([name, d]) => (
                                    <div key={name}>
                                        <div className="flex justify-between text-sm mb-2">
                                            <span className="text-slate-300 font-medium">{name}</span>
                                            <span className="text-yellow-500 font-bold">{d.count} คิว (฿{d.income.toLocaleString()})</span>
                                        </div>
                                        <div className="w-full bg-slate-700 rounded-full h-2.5 overflow-hidden">
                                            <div 
                                                className="bg-gradient-to-r from-yellow-600 to-yellow-400 h-full rounded-full transition-all duration-1000" 
                                                style={{width: `${(d.count / (Math.max(...Object.values(stats.byBarber).map(x=>x.count), 1))) * 100}%`}}
                                            ></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* ตามบริการ */}
                        <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
                            <h2 className="text-white font-bold mb-5 flex items-center gap-2"><Icons.Scissors /> 5 อันดับทรงผมยอดนิยม</h2>
                            <div className="space-y-4">
                                {stats.byService.map(([svc, d], i) => (
                                    <div key={svc} className="flex items-center gap-4 bg-slate-900/50 p-3 rounded-xl border border-slate-700/50">
                                        <div className="bg-yellow-500 text-slate-900 w-6 h-6 rounded-full flex items-center justify-center font-bold text-xs shrink-0">{i+1}</div>
                                        <div className="flex-1 min-w-0">
                                            <div className="text-slate-200 text-sm font-semibold truncate">{svc}</div>
                                            <div className="text-[10px] text-slate-500 uppercase tracking-wider">{d.count} ครั้ง | ฿{d.income.toLocaleString()}</div>
                                        </div>
                                        <div className="text-green-500 font-bold text-sm">฿{d.income.toLocaleString()}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DashboardApp />);
    </script>
</body>
</html>
